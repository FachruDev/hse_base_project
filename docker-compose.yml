name: hse-project-server-b

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${DOCKER_APP_PORT:-8082}:80"
    volumes:
      - app-storage:/var/www/html/storage
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      RUN_STORAGE_LINK: "false"
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=90
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  app-storage:
